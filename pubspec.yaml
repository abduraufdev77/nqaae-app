name: nqaae_app
description: "NQAAE University Dashboard App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # UI & Charts
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  iconsax_flutter: ^1.0.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.0

  # Localization
  easy_localization: ^3.0.7

  # Storage & Auth
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Utils
  http: ^1.2.2
  intl: ^0.20.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
    - assets/icons/
    - assets/icons/auth/
    - assets/data/
    - assets/data/survey/
